<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Batch OCR</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #1a1a1a; color: #ccc; font-family: monospace; font-size: 13px;
       display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
#toolbar { display: flex; align-items: center; gap: 10px; padding: 8px 14px;
           background: #222; border-bottom: 1px solid #333; flex-shrink: 0; flex-wrap: wrap; }
.btn { cursor: pointer; background: #2e2e2e; border: 1px solid #555; padding: 5px 12px;
       border-radius: 4px; color: #ccc; font-family: monospace; font-size: 13px; }
.btn:hover { background: #3a3a3a; }
.btn:disabled { opacity: 0.4; cursor: default; }
.btn.active { background: #3a5a3a; border-color: #4a8a4a; color: #7fdf7f; }
label.btn { display: inline-block; }
#pdf-input { display: none; }
#status { margin-left: auto; font-size: 11px; color: #666; }
#progress-wrap { width: 200px; background: #333; border-radius: 3px; height: 6px; display: none; }
#progress-bar  { height: 6px; background: #4a8a4a; border-radius: 3px; width: 0%; transition: width 0.1s; }
#output { flex: 1; overflow-y: auto; padding: 14px; white-space: pre-wrap; word-break: break-all;
          font-size: 12px; line-height: 1.6; color: #8f8; background: #111; }
</style>
</head>
<body>

<div id="toolbar">
  <label class="btn" id="pdf-label">
    Pick PDF
    <input type="file" id="pdf-input" accept="application/pdf">
  </label>
  <button class="btn" id="save-btn"   disabled>Save base64.txt</button>
  <button class="btn" id="decode-btn" disabled>Decode PDF</button>
  <div id="progress-wrap"><div id="progress-bar"></div></div>
  <div id="status">Pick a PDF to start</div>
</div>

<div id="output">Results will appear here…</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc =
  'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

// ---------------------------------------------------------------------------
// TemplateEngine (inline copy from training.js)
// ---------------------------------------------------------------------------
const STEM_TO_CHAR = { eq: '=', slash: '/', plus: '+', minus: '-' };
const CHAR_TO_STEM = Object.fromEntries(Object.entries(STEM_TO_CHAR).map(([k, v]) => [v, k]));

class TemplateEngine {
  constructor() { this.templates = []; this._canvas = null; this._ctx = null; }

  stemToChar(stem) {
    const base = stem.split('_')[0];
    return STEM_TO_CHAR[base] ?? (stem.includes('_UPPER') ? stem.split('_UPPER')[0] : base);
  }

  _dataToGray(data) {
    const pixels = new Float32Array(77);
    for (let i = 0; i < 77; i++)
      pixels[i] = (data[i * 4] + data[i * 4 + 1] + data[i * 4 + 2]) / 3;
    return pixels;
  }

  _pixelStats(pixels) {
    let sum = 0;
    for (let i = 0; i < 77; i++) sum += pixels[i];
    const mean = sum / 77;
    let sq = 0;
    for (let i = 0; i < 77; i++) { const v = pixels[i] - mean; sq += v * v; }
    return { mean, l2: Math.sqrt(sq) };
  }

  async loadFromDir(dirHandle) {
    this.templates = [];
    const tasks = [];
    for await (const [name, handle] of dirHandle.entries()) {
      if (handle.kind !== 'file' || !name.endsWith('.png') || name.includes('unmatched')) continue;
      const stem = name.slice(0, -4);
      const char = this.stemToChar(stem);
      if (!char || char.length !== 1) continue;
      tasks.push(handle.getFile().then(async file => {
        const url = URL.createObjectURL(file);
        try { return await this._loadGray(url, char); } finally { URL.revokeObjectURL(url); }
      }));
    }
    const results = await Promise.all(tasks);
    this.templates = results.filter(Boolean);
    return this.templates.length;
  }

  async loadFromHTTP(manifest) {
    const tasks = manifest.map(({ filename, char }) => this._loadGray(`/templates/${filename}`, char));
    const results = await Promise.all(tasks);
    this.templates = results.filter(Boolean);
    return this.templates.length;
  }

  _loadGray(url, char) {
    return new Promise(resolve => {
      const img = new Image();
      img.onload = () => {
        const c = document.createElement('canvas');
        c.width = 7; c.height = 11;
        const ctx = c.getContext('2d');
        ctx.imageSmoothingEnabled = false;
        ctx.drawImage(img, 0, 0, 7, 11);
        const pixels = this._dataToGray(ctx.getImageData(0, 0, 7, 11).data);
        const { mean, l2 } = this._pixelStats(pixels);
        resolve({ char, pixels, mean, den: l2 });
      };
      img.onerror = () => resolve(null);
      img.src = url;
    });
  }

  _cropCtx() {
    if (!this._canvas) {
      this._canvas = document.createElement('canvas');
      this._canvas.width = 7; this._canvas.height = 11;
      this._ctx = this._canvas.getContext('2d', { willReadFrequently: true });
    }
    return this._ctx;
  }

  extractCrop(source, sx, sy) {
    if (source instanceof ImageData) {
      const pixels = new Float32Array(77);
      sx = Math.ceil(sx);
      const w = source.width;
      const data = source.data;
      for (let r = 0; r < 11; r++) {
        const rowOffset = (sy + r) * w * 4;
        for (let c = 0; c < 7; c++) {
          const i = rowOffset + (sx + c) * 4;
          pixels[r * 7 + c] = (data[i] + data[i + 1] + data[i + 2]) / 3;
        }
      }
      return pixels;
    }
    const ctx = this._cropCtx();
    ctx.clearRect(0, 0, 7, 11);
    ctx.imageSmoothingEnabled = false;
    ctx.drawImage(source, Math.ceil(sx), sy, 7, 11, 0, 0, 7, 11);
    return this._dataToGray(ctx.getImageData(0, 0, 7, 11).data);
  }

  ncc(a, aMean, aL2, t) {
    let num = 0;
    for (let i = 0; i < 77; i++) num += (a[i] - aMean) * (t.pixels[i] - t.mean);
    const den = aL2 * t.den;
    return den < 1e-8 ? 0 : num / den;
  }

  matchPixels(pixels) {
    const { mean, l2 } = this._pixelStats(pixels);
    if (l2 / Math.sqrt(77) < 5) return { char: ' ', score: 1, blank: true };
    let bestChar = '?', bestScore = -Infinity;
    for (const t of this.templates) {
      const score = this.ncc(pixels, mean, l2, t);
      if (score > bestScore) { bestScore = score; bestChar = t.char; }
    }
    return { char: bestChar, score: bestScore, blank: false };
  }

  ocrImage(imgEl, rowBands, config) {
    const pitch = config.charPitch;
    return rowBands.map(({ y0 }) =>
      Array.from({ length: config.nCols }, (_, col) => {
        const pixels = this.extractCrop(imgEl, config.xStart + col * pitch, y0);
        return this.matchPixels(pixels);
      })
    );
  }
}

// ---------------------------------------------------------------------------
// Config (same geometry as training.js)
// ---------------------------------------------------------------------------
class Config {
  constructor() {
    this.xStart = 60; this.xEnd = 653; this.nCols = 76;
  }
  get charPitch() { return (this.xEnd - this.xStart) / this.nCols; }
}

function makeRowBands(base) {
  return Array.from({ length: 65 }, (_, i) => ({ y0: base + i * 15, y1: base + 11 + i * 15 }));
}

function autoDetectBase(imgEl, config, engine) {
  const MIN_BASE = 28, MAX_BASE = 52, PROBE_ROWS = 10, THRESHOLD = 0.40;
  let bestBase = 40, bestAvg = -Infinity;
  for (let base = MIN_BASE; base <= MAX_BASE; base++) {
    const probeBands = makeRowBands(base).slice(-PROBE_ROWS);
    const results = engine.ocrImage(imgEl, probeBands, config);
    let sum = 0, count = 0;
    for (const row of results)
      for (const r of row)
        if (!r.blank) { sum += r.score; count++; }
    const avg = count > 0 ? sum / count : 0;
    if (avg > bestAvg) { bestAvg = avg; bestBase = base; }
  }
  return bestAvg >= THRESHOLD ? bestBase : 40;
}

// ---------------------------------------------------------------------------
// PDF embedded-image extraction (from pdf_to_png.html)
// ---------------------------------------------------------------------------
async function extractEmbeddedImages(page) {
  const ops = await page.getOperatorList();
  const canvases = [];
  const seen = new Set();

  for (let i = 0; i < ops.fnArray.length; i++) {
    if (ops.fnArray[i] !== pdfjsLib.OPS.paintImageXObject &&
        ops.fnArray[i] !== pdfjsLib.OPS.paintImageXObjectRepeat &&
        ops.fnArray[i] !== pdfjsLib.OPS.paintJpegXObject) continue;

    const imageName = ops.argsArray[i][0];
    if (seen.has(imageName)) continue;
    seen.add(imageName);

    const img = await new Promise(resolve => page.objs.get(imageName, resolve));
    if (!img) continue;

    const canvas = document.createElement('canvas');
    canvas.width  = img.width;
    canvas.height = img.height;
    const ctx = canvas.getContext('2d', { willReadFrequently: true });

    if (img.bitmap) {
      ctx.drawImage(img.bitmap, 0, 0);
    } else if (img.data) {
      const imageData = new ImageData(
        new Uint8ClampedArray(img.data.buffer ?? img.data),
        img.width,
        img.height
      );
      ctx.putImageData(imageData, 0, 0);
    } else {
      continue;
    }

    canvases.push(canvas);
  }
  return canvases;
}

// ---------------------------------------------------------------------------
// App
// ---------------------------------------------------------------------------
const config  = new Config();
const engine  = new TemplateEngine();

const pdfInput = document.getElementById('pdf-input');
const saveBtn   = document.getElementById('save-btn');
const decodeBtn = document.getElementById('decode-btn');
const statusEl = document.getElementById('status');
const outputEl = document.getElementById('output');
const progWrap = document.getElementById('progress-wrap');
const progBar  = document.getElementById('progress-bar');

let pdfDoc    = null;
let resultText = '';

function setStatus(msg) { statusEl.textContent = msg; }
function setProgress(n, total) {
  progWrap.style.display = 'block';
  progBar.style.width = `${Math.round(n / total * 100)}%`;
  if (n >= total) setTimeout(() => { progWrap.style.display = 'none'; }, 600);
}

// PDF picked
pdfInput.addEventListener('change', async e => {
  const file = e.target.files[0];
  if (!file) return;
  setStatus('Loading PDF…');
  const ab = await file.arrayBuffer();
  pdfDoc = await pdfjsLib.getDocument({ data: ab }).promise;
  setStatus(`${file.name}  ·  ${pdfDoc.numPages} pages`);
  document.getElementById('pdf-label').classList.add('active');
  await runOCR();
});

// Run OCR over all PDF pages
async function runOCR() {
  if (!pdfDoc) return;
  saveBtn.disabled = true;
  decodeBtn.disabled = true;
  outputEl.textContent = '';
  resultText = '';

  const total = pdfDoc.numPages;
  const lines = [];

  for (let i = 1; i <= total; i++) {
    setStatus(`Processing page ${i} / ${total}…`);
    setProgress(i - 1, total);
    await new Promise(r => setTimeout(r, 0));

    const page   = await pdfDoc.getPage(i);
    const images = await extractEmbeddedImages(page);

    for (const canvas of images) {
      const ctx      = canvas.getContext('2d');
      const imgData  = ctx.getImageData(0, 0, canvas.width, canvas.height);
      const base     = autoDetectBase(imgData, config, engine);
      const rowBands = makeRowBands(base);
      const rows     = engine.ocrImage(imgData, rowBands, config);
      for (const row of rows) {
        if (row.every(r => r.blank)) continue;
        const nonBlank = row.filter(r => !r.blank);
        const avg = nonBlank.reduce((s, r) => s + r.score, 0) / nonBlank.length;
        if (avg < 0.40) continue;
        lines.push(row.map(r => r.blank ? ' ' : r.char).join('').trimEnd());
        setStatus(`Processing page ${i} / ${total}  — ${lines.length} rows kept`);
      }
    }

    if (images.length === 0) outputEl.textContent += `page ${i}: no embedded images found\n`;
    setProgress(i, total);
  }

  setProgress(total, total);

  const B64_MARKER = 'JVBERi0xLj';
  const fullText   = lines.join('\n');
  const markerIdx  = fullText.indexOf(B64_MARKER);
  if (markerIdx !== -1) {
    resultText = fullText.slice(markerIdx).replace(/ +/g, '');
    outputEl.textContent = resultText;
    setStatus(`Done — ${total} pages  ·  base64: ${resultText.length} chars`);
  } else {
    resultText = '';
    outputEl.textContent = '(base64 marker "JVBERi0xLj" not found — check templates or grid)';
    setStatus(`Done — ${total} pages  ·  base64 marker not found`);
  }
  saveBtn.disabled = false;
  decodeBtn.disabled = false;
}

// Decode base64 → PDF download
decodeBtn.addEventListener('click', () => {
  const binary = atob(resultText);
  const bytes  = new Uint8Array(binary.length);
  for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
  const blob = new Blob([bytes], { type: 'application/pdf' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'decoded.pdf'; a.click();
  URL.revokeObjectURL(url);
});

// Save base64.txt
saveBtn.addEventListener('click', () => {
  const blob = new Blob([resultText], { type: 'text/plain' });
  const url  = URL.createObjectURL(blob);
  const a    = document.createElement('a');
  a.href = url; a.download = 'base64.txt'; a.click();
  URL.revokeObjectURL(url);
});
